<!DOCTYPE html>
<html>
<head>
    <title>Undangan Digital Eki</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            text-align: center;
            background: url('background.jpg') no-repeat center center/cover;
        }

        h1, h2 {
            font-family: 'Playfair-Display', serif;
        }

        .opening {
            background-color: #b76e79;
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .opening button {
            padding: 15px 30px;
            border: none;
            background: white;
            color: #b76e79;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
        }

        .content {
            display: none;
            background-color: #f8f1f1;
            padding: 50px;
        }

        .fade-out {
            animation: fadeOut 1s forwards;
        }

        .fade-in {
            animation: fadeIn 1.5s forwards;
        }

        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .card {
            background-color: rgba(255,255,255,0.9);
            padding: 50px 40px;
            border-radius: 25px;
            box-shadow: 0px 15px 40px rgba(0,0,0,0.4);
            display: inline-block;
            max-width: 500px;
        }
        
        .card h1 {
            font-size: 40px;
            margin-bottom: 15px;
            color: #b76e79;
        }

        .card p {
            font-size: 18px;
            color: #333;
        }

        #countdown {
            font-size: 20px;
            margin-top: 20px;
            font-weight: bold;
            color: #b76e79;
        }
        
        .overlay {
            background: rgba(0,0,0,0.3);
            min-height: 100vh;
            padding: 60px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>

<body>

    <!-- Halaman Pembuka -->
    <div class="opening" id="opening">
        <h1>Undangan Pernikahan</h1>
        <h2>Eki Rifatulloh & Pasangan</h2>
        <p>Kepada Yth.</p>
        <h3 id="namaTamu"></h3>
        <button onclick="bukaUndangan()">Buka Undangan</button>
    </div>

    <!-- Isi Undangan -->
    <div class="content" id="content">
        <div class="overlay">
            <div class="card">
                <h1>Eki Rifatulloh & Mempelai Wanita</h1>
                <p>Sabtu, 29 Februari 2026</p>
                <h3>Menuju Hari Bahagia</h3>
                <div id="countdown"></div>
                <p>Aula Istana Merdeka, DKI Jakarta</p>
            </div>
        </div>
    </div>

    <!-- Musik -->
    <audio id="musik" src="Anugerah Terindah - Andmesh Saxophone Cover by Dori Wirawan.mp3"></audio>

    <script>
    function bukaUndangan() {
        const opening = document.getElementById("opening");
        const content = document.getElementById("content");
        const musik = document.getElementById("musik");

        opening.classList.add("fade-out");

        setTimeout(() => {
            opening.style.display = "none";
            content.style.display = "block";
            content.classList.add("fade-in");
            musik.play();
        }, 1000);
    }

        const targetDate = new Date("Feb 28, 2026 00:00:00").getTime();

        const countdownFunction = setInterval(function() {

            const now = new Date().getTime();
            const distance = targetDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("countdown").innerHTML =
                days + " Hari " +
                hours + " Jam " +
                minutes + " Menit " +
                seconds + " Detik ";

            if (distance < 0) {
                clearInterval(countdownFunction);
                document.getElementById("countdown").innerHTML = "Acara Telah Dimulai";
            }

        }, 1000);

        const urlParams = new URLSearchParams(window.location.search);
        const nama = urlParams.get('to');

        if (nama) {
            document.getElementById("namaTamu").innerText = nama;
        } else {
            document.getElementById("namaTamu").innerText = "Tamu Undangan";
        }

</script>

</body>
</html>
